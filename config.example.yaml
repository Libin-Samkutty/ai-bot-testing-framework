openai:
  api_key: "sk-proj-your-api-key-here"
  judge_model: "gpt-4o-mini"   # or gpt-4o

evaluation:
  temperature: 0.0              # Keep judge deterministic
  max_tokens: 512
  max_retries: 3                # Retry failed API calls (exponential backoff: 1s, 2s, 4s)
  backoff_base: 2.0             # Base for backoff: wait = backoff_base ^ attempt

output:
  reports_dir: "outputs"

# Pricing in USD per 1M tokens (update if OpenAI changes rates)
pricing:
  gpt-4o:
    input:  2.50
    output: 10.00
  gpt-4o-mini:
    input:  0.15
    output: 0.60
  gpt-4-turbo:
    input:  10.00
    output: 30.00
  gpt-3.5-turbo:
    input:  0.50
    output: 1.50
