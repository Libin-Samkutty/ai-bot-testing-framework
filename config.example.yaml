openai:
  api_key: "sk-proj-your-api-key-here"
  judge_model: "gpt-4o-mini"   # or gpt-4o

evaluation:
  temperature: 0.0              # Keep judge deterministic
  max_tokens: 512
  max_retries: 3                # Retry failed API calls (exponential backoff: 1s, 2s, 4s)
  backoff_base: 2.0             # Base for backoff: wait = backoff_base ^ attempt

output:
  reports_dir: "outputs"

# ── Optional: Google Cloud / Vertex AI ────────────────────────────────────────
# Required only when using GeminiConnector (connectors/gemini_connector.py).
# Leave commented out if you are using OpenAI only.
#
# gcp:
#   project_id: "your-gcp-project-id"
#   location: "us-central1"
#   service_account_path: "config/client_secrets.json"  # or set GOOGLE_APPLICATION_CREDENTIALS

# ── Optional: Gemini generation parameters ────────────────────────────────────
# Tune these when using GeminiConnector. Ignored for OpenAI connectors.
#
# gemini:
#   model: "gemini-2.5-flash"
#   temperature: 0.2
#   top_p: 0.8
#   top_k: 40
#   max_output_tokens: 8000

# ── Optional: External system prompt file ─────────────────────────────────────
# Point to a .txt file containing your bot's system prompt.
# Used by GeminiConnector (and any connector that loads prompts from disk).
# When this file changes, the cache is automatically invalidated.
#
# system_prompt_path: "prompts/my_bot_system_prompt.txt"

# Pricing in USD per 1M tokens (update if OpenAI changes rates)
pricing:
  gpt-4o:
    input:  2.50
    output: 10.00
  gpt-4o-mini:
    input:  0.15
    output: 0.60
  gpt-4-turbo:
    input:  10.00
    output: 30.00
  gpt-3.5-turbo:
    input:  0.50
    output: 1.50
